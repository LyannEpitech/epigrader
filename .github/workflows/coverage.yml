name: Coverage Report

on:
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block PR if this fails
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Backend Coverage
      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests with coverage
        run: cd backend && npm run test:coverage || true

      # Frontend Coverage
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests with coverage
        run: cd frontend && npm run test:coverage || true

      # Post PR Comment
      - name: Post Coverage Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read coverage summaries
            let backendCoverage = { lines: 0, functions: 0, branches: 0, statements: 0 };
            let frontendCoverage = { lines: 0, functions: 0, branches: 0, statements: 0 };
            
            try {
              const backendSummary = JSON.parse(fs.readFileSync('backend/coverage/coverage-summary.json', 'utf8'));
              backendCoverage = backendSummary.total || backendCoverage;
            } catch (e) {
              console.log('Backend coverage summary not found:', e.message);
            }
            
            try {
              const frontendSummary = JSON.parse(fs.readFileSync('frontend/coverage/coverage-summary.json', 'utf8'));
              frontendCoverage = frontendSummary.total || frontendCoverage;
            } catch (e) {
              console.log('Frontend coverage summary not found:', e.message);
            }
            
            const formatPct = (pct) => pct ? pct.toFixed(2) + '%' : 'N/A';
            
            const body = `## 📊 Coverage Report
            
            ### Backend
            | Metric | Coverage | Threshold | Status |
            |--------|----------|-----------|--------|
            | Lines | ${formatPct(backendCoverage.lines?.pct)} | 70% | ${(backendCoverage.lines?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Functions | ${formatPct(backendCoverage.functions?.pct)} | 70% | ${(backendCoverage.functions?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Branches | ${formatPct(backendCoverage.branches?.pct)} | 70% | ${(backendCoverage.branches?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Statements | ${formatPct(backendCoverage.statements?.pct)} | 70% | ${(backendCoverage.statements?.pct || 0) >= 70 ? '✅' : '❌'} |
            
            ### Frontend
            | Metric | Coverage | Threshold | Status |
            |--------|----------|-----------|--------|
            | Lines | ${formatPct(frontendCoverage.lines?.pct)} | 70% | ${(frontendCoverage.lines?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Functions | ${formatPct(frontendCoverage.functions?.pct)} | 70% | ${(frontendCoverage.functions?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Branches | ${formatPct(frontendCoverage.branches?.pct)} | 70% | ${(frontendCoverage.branches?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Statements | ${formatPct(frontendCoverage.statements?.pct)} | 70% | ${(frontendCoverage.statements?.pct || 0) >= 70 ? '✅' : '❌'} |
            
            ${((backendCoverage.lines?.pct || 0) < 70 || (frontendCoverage.lines?.pct || 0) < 70) ? '⚠️ **Coverage below threshold!**' : '✅ **All coverage thresholds met!**'}
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Coverage Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }