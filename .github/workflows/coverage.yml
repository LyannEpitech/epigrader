name: Coverage Report

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block PR if this fails
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for base branch comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Backend Coverage - PR Branch
      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests with coverage
        run: cd backend && npm run test:coverage || true

      # Frontend Coverage - PR Branch
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests with coverage
        run: cd frontend && npm run test:coverage || true

      # Save PR coverage for comparison
      - name: Save PR coverage
        run: |
          mkdir -p /tmp/pr-coverage
          cp backend/coverage/coverage-summary.json /tmp/pr-coverage/backend.json 2>/dev/null || echo '{"total":{"lines":{"pct":0},"functions":{"pct":0},"branches":{"pct":0},"statements":{"pct":0}}}' > /tmp/pr-coverage/backend.json
          cp frontend/coverage/coverage-summary.json /tmp/pr-coverage/frontend.json 2>/dev/null || echo '{"total":{"lines":{"pct":0},"functions":{"pct":0},"branches":{"pct":0},"statements":{"pct":0}}}' > /tmp/pr-coverage/frontend.json

      # Checkout base branch for comparison
      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
          git checkout ${{ github.base_ref }}

      # Backend Coverage - Base Branch
      - name: Run backend tests on base branch
        run: |
          mkdir -p /tmp/base-coverage
          if [ -f "backend/package.json" ]; then
            cd backend && npm ci 2>/dev/null && npm run test:coverage 2>/dev/null || true
            cp coverage/coverage-summary.json /tmp/base-coverage/backend.json 2>/dev/null || true
          fi
          if [ ! -f "/tmp/base-coverage/backend.json" ]; then
            echo '{"total":{"lines":{"pct":0},"functions":{"pct":0},"branches":{"pct":0},"statements":{"pct":0}}}' > /tmp/base-coverage/backend.json
          fi

      # Frontend Coverage - Base Branch
      - name: Run frontend tests on base branch
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm ci 2>/dev/null && npm run test:coverage 2>/dev/null || true
            cp coverage/coverage-summary.json /tmp/base-coverage/frontend.json 2>/dev/null || true
          fi
          if [ ! -f "/tmp/base-coverage/frontend.json" ]; then
            echo '{"total":{"lines":{"pct":0},"functions":{"pct":0},"branches":{"pct":0},"statements":{"pct":0}}}' > /tmp/base-coverage/frontend.json
          fi

      # Post PR Comment
      - name: Post Coverage Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read PR coverage
            let prBackendCoverage = { lines: 0, functions: 0, branches: 0, statements: 0 };
            let prFrontendCoverage = { lines: 0, functions: 0, branches: 0, statements: 0 };
            
            try {
              const prBackendSummary = JSON.parse(fs.readFileSync('/tmp/pr-coverage/backend.json', 'utf8'));
              prBackendCoverage = prBackendSummary.total || prBackendCoverage;
            } catch (e) {
              console.log('PR Backend coverage not found:', e.message);
            }
            
            try {
              const prFrontendSummary = JSON.parse(fs.readFileSync('/tmp/pr-coverage/frontend.json', 'utf8'));
              prFrontendCoverage = prFrontendSummary.total || prFrontendCoverage;
            } catch (e) {
              console.log('PR Frontend coverage not found:', e.message);
            }
            
            // Read base coverage
            let baseBackendCoverage = { lines: 0, functions: 0, branches: 0, statements: 0 };
            let baseFrontendCoverage = { lines: 0, functions: 0, branches: 0, statements: 0 };
            
            try {
              const baseBackendSummary = JSON.parse(fs.readFileSync('/tmp/base-coverage/backend.json', 'utf8'));
              baseBackendCoverage = baseBackendSummary.total || baseBackendCoverage;
            } catch (e) {
              console.log('Base Backend coverage not found:', e.message);
            }
            
            try {
              const baseFrontendSummary = JSON.parse(fs.readFileSync('/tmp/base-coverage/frontend.json', 'utf8'));
              baseFrontendCoverage = baseFrontendSummary.total || baseFrontendCoverage;
            } catch (e) {
              console.log('Base Frontend coverage not found:', e.message);
            }
            
            const formatPct = (pct) => pct ? pct.toFixed(2) + '%' : 'N/A';
            
            const formatDiff = (pr, base) => {
              const diff = (pr || 0) - (base || 0);
              const sign = diff > 0 ? '+' : '';
              const emoji = diff > 0 ? '📈' : diff < 0 ? '📉' : '➡️';
              return `${emoji} ${sign}${diff.toFixed(2)}%`;
            };
            
            const body = `## 📊 Coverage Report
            
            ### Backend
            | Metric | This PR | Base (${{ github.base_ref }}) | Diff | Threshold | Status |
            |--------|---------|-------------------------------|------|-----------|--------|
            | Lines | ${formatPct(prBackendCoverage.lines?.pct)} | ${formatPct(baseBackendCoverage.lines?.pct)} | ${formatDiff(prBackendCoverage.lines?.pct, baseBackendCoverage.lines?.pct)} | 70% | ${(prBackendCoverage.lines?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Functions | ${formatPct(prBackendCoverage.functions?.pct)} | ${formatPct(baseBackendCoverage.functions?.pct)} | ${formatDiff(prBackendCoverage.functions?.pct, baseBackendCoverage.functions?.pct)} | 70% | ${(prBackendCoverage.functions?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Branches | ${formatPct(prBackendCoverage.branches?.pct)} | ${formatPct(baseBackendCoverage.branches?.pct)} | ${formatDiff(prBackendCoverage.branches?.pct, baseBackendCoverage.branches?.pct)} | 70% | ${(prBackendCoverage.branches?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Statements | ${formatPct(prBackendCoverage.statements?.pct)} | ${formatPct(baseBackendCoverage.statements?.pct)} | ${formatDiff(prBackendCoverage.statements?.pct, baseBackendCoverage.statements?.pct)} | 70% | ${(prBackendCoverage.statements?.pct || 0) >= 70 ? '✅' : '❌'} |
            
            ### Frontend
            | Metric | This PR | Base (${{ github.base_ref }}) | Diff | Threshold | Status |
            |--------|---------|-------------------------------|------|-----------|--------|
            | Lines | ${formatPct(prFrontendCoverage.lines?.pct)} | ${formatPct(baseFrontendCoverage.lines?.pct)} | ${formatDiff(prFrontendCoverage.lines?.pct, baseFrontendCoverage.lines?.pct)} | 70% | ${(prFrontendCoverage.lines?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Functions | ${formatPct(prFrontendCoverage.functions?.pct)} | ${formatPct(baseFrontendCoverage.functions?.pct)} | ${formatDiff(prFrontendCoverage.functions?.pct, baseFrontendCoverage.functions?.pct)} | 70% | ${(prFrontendCoverage.functions?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Branches | ${formatPct(prFrontendCoverage.branches?.pct)} | ${formatPct(baseFrontendCoverage.branches?.pct)} | ${formatDiff(prFrontendCoverage.branches?.pct, baseFrontendCoverage.branches?.pct)} | 70% | ${(prFrontendCoverage.branches?.pct || 0) >= 70 ? '✅' : '❌'} |
            | Statements | ${formatPct(prFrontendCoverage.statements?.pct)} | ${formatPct(baseFrontendCoverage.statements?.pct)} | ${formatDiff(prFrontendCoverage.statements?.pct, baseFrontendCoverage.statements?.pct)} | 70% | ${(prFrontendCoverage.statements?.pct || 0) >= 70 ? '✅' : '❌'} |
            
            ${((prBackendCoverage.lines?.pct || 0) < 70 || (prFrontendCoverage.lines?.pct || 0) < 70) ? '⚠️ **Coverage below threshold!**' : '✅ **All coverage thresholds met!**'}
            
            ${((prBackendCoverage.lines?.pct || 0) < (baseBackendCoverage.lines?.pct || 0) || (prFrontendCoverage.lines?.pct || 0) < (baseFrontendCoverage.lines?.pct || 0)) ? '⚠️ **Coverage decreased compared to base branch!**' : '✅ **Coverage maintained or improved!**'}
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Coverage Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }