name: Build and Release

on:
  push:
    branches: [ main, master, feature/* ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
          electron/package-lock.json
    
    - name: Install dependencies - Backend
      working-directory: ./backend
      run: npm ci
      
    - name: Install dependencies - Frontend
      working-directory: ./frontend
      run: npm ci
      
    - name: Install dependencies - Electron
      working-directory: ./electron
      run: npm ci
    
    - name: Build Backend
      working-directory: ./backend
      run: npm run build
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
    
    - name: Build Electron App
      working-directory: ./electron
      run: npm run dist:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: |
          electron/dist/*.exe
          electron/dist/*.msi
          electron/dist/*.zip
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          electron/dist/*.exe
          electron/dist/*.msi
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
          electron/package-lock.json
    
    - name: Install dependencies - Backend
      working-directory: ./backend
      run: npm ci
      
    - name: Install dependencies - Frontend
      working-directory: ./frontend
      run: npm ci
      
    - name: Install dependencies - Electron
      working-directory: ./electron
      run: npm ci
    
    - name: Build Backend
      working-directory: ./backend
      run: npm run build
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
    
    - name: Build Electron App
      working-directory: ./electron
      run: npm run dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-installer
        path: |
          electron/dist/*.AppImage
          electron/dist/*.deb
          electron/dist/*.snap
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          electron/dist/*.AppImage
          electron/dist/*.deb
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
          electron/package-lock.json
    
    - name: Install dependencies - Backend
      working-directory: ./backend
      run: npm ci
      
    - name: Install dependencies - Frontend
      working-directory: ./frontend
      run: npm ci
      
    - name: Install dependencies - Electron
      working-directory: ./electron
      run: npm ci
    
    - name: Build Backend
      working-directory: ./backend
      run: npm run build
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
    
    - name: Build Electron App
      working-directory: ./electron
      run: npm run dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-installer
        path: |
          electron/dist/*.dmg
          electron/dist/*.zip
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          electron/dist/*.dmg
          electron/dist/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}