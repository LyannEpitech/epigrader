<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiGrader - Configuration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    .logo h1 {
      font-size: 28px;
      color: #1e3a5f;
      margin-bottom: 5px;
    }
    
    .logo p {
      color: #666;
      font-size: 14px;
    }
    
    h2 {
      color: #1e3a5f;
      font-size: 20px;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    
    .required {
      color: #ff6b35;
    }
    
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #1e3a5f;
    }
    
    input.error {
      border-color: #ff6b35;
    }
    
    .help-text {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }
    
    .help-text a {
      color: #1e3a5f;
      text-decoration: none;
      cursor: pointer;
    }
    
    .help-text a:hover {
      text-decoration: underline;
    }
    
    .btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255,107,53,0.4);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }
    
    .loading.show {
      display: block;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 12px;
    }
    
    .input-wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <h1>EpiGrader</h1>
      <p>Évaluation automatique Epitech</p>
    </div>
    
    <h2>Configuration initiale</h2>
    <p class="subtitle">Entrez votre clé API pour commencer</p>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form id="configForm">
      <div class="form-group">
        <label for="moonshotKey">
          Clé API Moonshot <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="moonshotKey" 
            placeholder="sk-..."
            required
          >
        </div>
        <p class="help-text">
          Obtenez votre clé sur <a id="moonshotLink">platform.moonshot.cn</a>
        </p>
      </div>
      
      <div class="form-group">
        <label for="githubToken">Token GitHub (optionnel)</label>
        <input 
          type="password" 
          id="githubToken" 
          placeholder="ghp_..."
        >
        <p class="help-text">
          Pour les dépôts privés. <a id="githubLink">Créer un token</a>
        </p>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">
        Démarrer EpiGrader
      </button>
    </form>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Démarrage de l'application...</p>
    </div>
  </div>
  
  <script>
    // Open external links
    document.getElementById('moonshotLink').addEventListener('click', (e) => {
      e.preventDefault();
      window.electronAPI.openExternal('https://platform.moonshot.cn/');
    });
    
    document.getElementById('githubLink').addEventListener('click', (e) => {
      e.preventDefault();
      window.electronAPI.openExternal('https://github.com/settings/tokens');
    });
    
    // Form submission
    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const moonshotKey = document.getElementById('moonshotKey').value.trim();
      const githubToken = document.getElementById('githubToken').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const errorDiv = document.getElementById('errorMessage');
      
      // Validation
      if (!moonshotKey) {
        showError('La clé API Moonshot est requise');
        return;
      }
      
      if (!moonshotKey.startsWith('sk-')) {
        showError('La clé API doit commencer par "sk-"');
        return;
      }
      
      // Show loading
      submitBtn.disabled = true;
      loading.classList.add('show');
      errorDiv.classList.remove('show');
      
      try {
        const result = await window.electronAPI.saveConfig({
          moonshotApiKey: moonshotKey,
          githubToken: githubToken
        });
        
        if (!result.success) {
          showError(result.error || 'Erreur lors de la sauvegarde');
          submitBtn.disabled = false;
          loading.classList.remove('show');
        }
        // Window will close automatically on success
        
      } catch (err) {
        showError('Erreur: ' + err.message);
        submitBtn.disabled = false;
        loading.classList.remove('show');
      }
    });
    
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
  </script>
</body>
</html>
