<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiGrader - Configuration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo h1 {
      font-size: 2.5rem;
      color: #1e3a5f;
      margin-bottom: 8px;
    }
    
    .logo p {
      color: #666;
      font-size: 1rem;
    }
    
    .step {
      margin-bottom: 24px;
    }
    
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: #1e3a5f;
      color: white;
      border-radius: 50%;
      font-weight: bold;
      margin-right: 12px;
      font-size: 0.9rem;
    }
    
    .step-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e3a5f;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #555;
      font-weight: 500;
    }
    
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #1e3a5f;
    }
    
    .help-text {
      font-size: 0.85rem;
      color: #888;
      margin-top: 6px;
    }
    
    .help-text a {
      color: #1e3a5f;
      text-decoration: none;
    }
    
    .help-text a:hover {
      text-decoration: underline;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 20px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(30, 58, 95, 0.3);
    }
    
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }
    
    .loading.active {
      display: block;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #1e3a5f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }
    
    .error.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🎓 EpiGrader</h1>
      <p>Configuration initiale</p>
    </div>
    
    <form id="configForm">
      <div class="step">
        <div class="step-title">
          <span class="step-number">1</span>
          Clé API Moonshot
        </div>
        <div class="form-group">
          <label for="moonshotKey">Clé API Moonshot (Kimi)</label>
          <input 
            type="password" 
            id="moonshotKey" 
            placeholder="sk-..."
            required
          >
          <p class="help-text">
            Obtenez votre clé sur <a href="#" onclick="openExternal('https://platform.moonshot.cn/')">platform.moonshot.cn</a>
          </p>
        </div>
      </div>
      
      <div class="step">
        <div class="step-title">
          <span class="step-number">2</span>
          Token GitHub (Optionnel)
        </div>
        <div class="form-group">
          <label for="githubToken">Personal Access Token GitHub</label>
          <input 
            type="password" 
            id="githubToken" 
            placeholder="ghp_..."
          >
          <p class="help-text">
            Nécessaire pour les repos privés. <a href="#" onclick="openExternal('https://github.com/settings/tokens')">Créer un token</a>
          </p>
        </div>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">
        Lancer EpiGrader
      </button>
      
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Démarrage de l'application...</p>
      </div>
      
      <div class="error" id="error"></div>
    </form>
  </div>
  
  <script>
    const { shell } = require('electron');
    
    function openExternal(url) {
      shell.openExternal(url);
    }
    
    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const moonshotKey = document.getElementById('moonshotKey').value.trim();
      const githubToken = document.getElementById('githubToken').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      
      if (!moonshotKey) {
        error.textContent = 'La clé API Moonshot est requise';
        error.classList.add('active');
        return;
      }
      
      submitBtn.disabled = true;
      loading.classList.add('active');
      error.classList.remove('active');
      
      try {
        await window.electronAPI.saveConfig({
          moonshotApiKey: moonshotKey,
          githubToken: githubToken
        });
        
        // Wait for backend to start
        setTimeout(async () => {
          const status = await window.electronAPI.checkBackend();
          if (status.running) {
            // Window will reload automatically via main process
          } else {
            error.textContent = 'Erreur de démarrage du serveur';
            error.classList.add('active');
            submitBtn.disabled = false;
            loading.classList.remove('active');
          }
        }, 3000);
        
      } catch (err) {
        error.textContent = 'Erreur: ' + err.message;
        error.classList.add('active');
        submitBtn.disabled = false;
        loading.classList.remove('active');
      }
    });
  </script>
</body>
</html>
